name: Terraform Deployment for mlops-stack-aws-seek
'on':
  push:
    branches:
    - main
    paths:
    - databricks-config/**
  workflow_dispatch: null
defaults:
  run:
    working-directory: ./databricks-config
jobs:
  staging:
    concurrency: mlops-stack-aws-seek-staging-terraform-job
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: https://e2-demo-tokyo.cloud.databricks.com
      DATABRICKS_TOKEN: ${{secrets.STAGING_WORKSPACE_TOKEN}}
    steps:
    - uses: actions/checkout@v3
    - uses: hashicorp/setup-terraform@v1
    - name: Terraform fmt
      id: fmt
      run: terraform -chdir=staging fmt -check
      continue-on-error: true
    - name: Configure Terraform state backend authentication
      run: '# Below we assume you''ve run the setup scripts under the cicd-setup-scripts
        directory

        # to create an AWS S3 bucket and IAM user with permission to access the bucket,
        and stored

        # an access key for the IAM user as Github Actions secrets with

        # name AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY. We set corresponding environment
        variables to authenticate to

        # the s3 backend as described in https://www.terraform.io/language/settings/backends/s3#credentials-and-shared-configuration

        echo "AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}" >> "$GITHUB_ENV"

        echo "AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}}" >> "$GITHUB_ENV"

        '
    - name: Terraform Init
      id: init
      run: terraform -chdir=staging init
    - name: Terraform Validate
      id: validate
      run: terraform -chdir=staging validate
    - name: Terraform Plan
      id: plan
      run: 'terraform -chdir=staging plan -no-color \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Apply
      id: apply
      run: 'terraform -chdir=staging apply -auto-approve \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Output
      id: output
      run: terraform -chdir=staging output -json
    - name: Commit Terraform Output to File
      id: commit
      run: "mkdir -p output\necho '${{ steps.output.outputs.stdout }}' | jq '.' >\
        \ output/staging.json\ngit config --global user.name 'Terraform Output Github\
        \ Workflow'\ngit config --global user.email '<>'\noutput=$(git status --porcelain)\n\
        if [ -n \"$output\" ]\nthen\n  git add -A\n  git commit -m \"Commit staging\
        \ output\"\n  git push\n  git fetch origin release\n  git checkout release\n\
        \  git cherry-pick main\n  git push\nfi\n"
  prod:
    concurrency: mlops-stack-aws-seek-prod-terraform-job
    needs: staging
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: https://e2-demo-tokyo.cloud.databricks.com
      DATABRICKS_TOKEN: ${{secrets.PROD_WORKSPACE_TOKEN}}
    steps:
    - uses: actions/checkout@v3
    - uses: hashicorp/setup-terraform@v1
    - name: Terraform fmt
      id: fmt
      run: terraform -chdir=prod fmt -check
      continue-on-error: true
    - name: Configure Terraform state backend authentication
      run: 'echo "AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}" >> "$GITHUB_ENV"

        echo "AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}}" >> "$GITHUB_ENV"

        '
    - name: Terraform Init
      id: init
      run: terraform -chdir=prod init
    - name: Terraform Validate
      id: validate
      run: terraform -chdir=prod validate
    - name: Terraform Plan
      id: plan
      run: 'terraform -chdir=prod plan -no-color \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Apply
      id: apply
      run: 'terraform -chdir=prod apply -auto-approve \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Output
      id: output
      run: terraform -chdir=prod output -json
    - name: Commit Terraform Output to File
      id: commit
      run: "git pull\nmkdir -p output\necho '${{ steps.output.outputs.stdout }}' |\
        \ jq '.' > output/prod.json\ngit config --global user.name 'Terraform Output\
        \ Github Workflow'\ngit config --global user.email '<>'\noutput=$(git status\
        \ --porcelain)\nif [ -n \"$output\" ]\nthen\n  git add -A\n  git commit -m\
        \ \"Commit prod output\"\n  git push\n  git fetch origin release\n  git checkout\
        \ release\n  git cherry-pick main\n  git push\nfi\n"
